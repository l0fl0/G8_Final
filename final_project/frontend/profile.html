<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameVault — Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="page-header">
        <h1>GameVault</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="games.html">Games</a>
            <a href="recommendations.html">Recommendations</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="login.html" class="guest-link">Login</a>
            <a href="signup.html" class="guest-link">Sign Up</a>
            <a href="#" id="logoutLink" class="hidden">Logout</a>
        </nav>
    </header>

    <main class="container">
        <section class="card">
            <h2>Profile</h2>
            <div class="profile-info">
                <p><strong>Username:</strong> <span id="profileUsername">Guest</span></p>
                <p><strong>Favorite Genre:</strong> Action / Sports</p>
            </div>

            <div class="stat-row">
                <div class="stat-box">
                    <div class="stat-num">2</div>
                    <div class="stat-label">Reviews</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num">2</div>
                    <div class="stat-label">Favorites</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num">3</div>
                    <div class="stat-label">Following</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num">1</div>
                    <div class="stat-label">Followers</div>
                </div>
            </div>

            <div class="divider"></div>
            <button id="followBtn" class="btn-outline">+ Follow User</button>
            <p id="followMessage" class="message"></p>
        </section>

        <section class="card">
            <h2>Review History</h2>
            <ul id="userReviews" class="review-list"></ul>
        </section>

        <section class="card">
            <h2>Favorite Games</h2>
            <ul id="favoriteGames" class="game-list"></ul>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
